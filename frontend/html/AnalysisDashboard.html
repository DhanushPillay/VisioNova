<!DOCTYPE html>

<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>VisioNova - Telemetry Processing</title>
    <!-- Blocking theme script to prevent FOUC -->
    <script>
        (function () {
            const theme = localStorage.getItem('visioNova_theme') || 'dark';
            document.documentElement.classList.add(theme);
        })();
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@300,0..1&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "v-bg": "#0A0F1A", 
                        "v-surface": "#0F1626", 
                        "v-panel": "#141C2F", 
                        "v-border": "rgba(255, 255, 255, 0.08)",
                        "v-text-main": "#F8FAFC",
                        "v-text-muted": "#94A3B8",
                        "v-authentic": "#64FFDA", 
                        "v-suspicious": "#FFB74D", 
                        "v-brand": "#3B82F6",
                        "v-danger": "#FF4A4A",
                        // Mappings for JS compatibility
                        "accent-blue": "#3B82F6",
                        "accent-green": "#64FFDA"
                    },
                    fontFamily: {
                        "sans": ["Inter", "sans-serif"],
                        "mono": ["Roboto Mono", "monospace"],
                    },
                    boxShadow: {
                        'panel': '0 4px 6px -1px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05)',
                    }
                },
            },
        }
    </script>
    
    <style>
        /* Base system overrides */
        body { background-color: #0A0F1A !important; color: #F8FAFC !important; letter-spacing: -0.01em; }
        .light body { background-color: #F8FAFC; color: #0F172A; }
        
        .panel {
            background-color: theme('colors.v-panel');
            border: 1px solid theme('colors.v-border');
            box-shadow: theme('boxShadow.panel');
        }
        
        .structural-grid {
            background-image: linear-gradient(theme('colors.v-border') 1px, transparent 1px),
                              linear-gradient(90deg, theme('colors.v-border') 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.15;
        }

        .data-label { font-family: theme('fontFamily.mono'); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: theme('colors.v-text-muted'); }
        
        /* Retheme Javascript Injected Dynamic Elements */
        #analysisSteps [data-step] .progress-track {
            border-radius: 0 !important;
            background-color: theme('colors.v-bg') !important;
            border: 1px solid theme('colors.v-border') !important;
            height: 12px !important;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.5) !important;
        }
        #analysisSteps [data-step] .step-bar {
            border-radius: 0 !important;
            box-shadow: none !important;
            border-right: 2px solid theme('colors.v-bg') !important;
            background-image: linear-gradient(90deg, rgba(255,255,255,0.1) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.1) 75%, transparent 75%, transparent);
            background-size: 20px 20px;
            animation: move-bg 1s linear infinite;
        }
        
        @keyframes move-bg {
            0% { background-position: 0 0; }
            100% { background-position: 20px 0; }
        }

        /* Processing Colors (Blue) -> brand */
        #analysisSteps [data-step] .step-status.text-accent-blue { color: theme('colors.v-brand') !important; }
        #analysisSteps [data-step] .step-bar.bg-accent-blue { background-color: theme('colors.v-brand') !important; }

        /* Complete Colors (Green) -> authentic */
        #analysisSteps [data-step] .step-status.text-accent-green { color: theme('colors.v-authentic') !important; }
        #analysisSteps [data-step] .step-bar.bg-accent-green { 
            background-color: theme('colors.v-authentic') !important; 
            animation: none !important;
            background-image: none !important;
        }

        #analysisSteps [data-step] .step-name {
            font-family: theme('fontFamily.mono') !important;
            font-size: 0.65rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
            color: #E2E8F0 !important;
        }
        #analysisSteps [data-step] .step-status {
            font-size: 0.65rem !important;
            text-transform: uppercase !important;
            letter-spacing: 0.1em !important;
        }
    </style>

                <!-- Main Processing Console -->

                    <div class="flex justify-between items-start mb-8 border-b border-v-border pb-6">

                            Processing
                        </span>
                    </div>

                    <!-- Tactical Visualizer -->
                    <div class="h-32 bg-v-bg border border-v-border relative flex flex-col items-center justify-center mb-10 overflow-hidden font-mono text-[9px] text-v-text-muted uppercase tracking-widest p-4">
                        <!-- Data Rain / Grid -->
                        <div class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.05)_1px,transparent_1px)] bg-[size:10px_10px] pointer-events-none opacity-50"></div>
                        
                        <div class="flex justify-between w-full z-10 opacity-70">
                            <span>Hash: VN-ACTIVE-SCAN</span>
                            <span>Node 14 Online</span>
                        </div>
                        
                        <!-- Animated Core -->
                        <div class="flex-1 flex w-full items-center justify-center relative z-10 my-2">
                            <div class="w-full h-1 bg-v-surface border border-v-border relative overflow-hidden">
                                <div class="absolute inset-y-0 left-0 bg-v-brand w-[20%] opacity-50 animate-[pulse_1s_ease-in-out_infinite]" style="animation: scan 1.5s ease-in-out infinite alternate;"></div>
                            </div>
                        </div>

                        <div class="flex justify-between w-full z-10 opacity-70">
                            <span id="loadingStatus" class="text-v-brand">establishing secure connection...</span>
                            <span>Awaiting Sequence</span>
                        </div>
                        
                        <!-- Internal scan line -->
                        <style>
                            @keyframes scan {
                                0% { left: 0%; right: 80%; }
                                100% { left: 80%; right: 0%; }
                            }
                        </style>
                    </div>

                    <!-- Progress Bars - Dynamically populated based on media type -->
                    <div id="analysisSteps" class="flex flex-col gap-6">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Dynamic Analysis Script -->
    <script>
                    // Analysis steps configuration by media type

                            ],

                                'Tokenizing text content...',
                                'Analyzing linguistic patterns...',
                                'Checking source attribution...',
                                'Running AI detection models...'
                            ]
                        },
                        url: {
                            title: 'Analyzing URL',
                            subtitle: 'Extracting and verifying content...',
                            badge: 'FETCHING_CONTENT',
                            steps: [
                                { name: 'Content Extraction', description: 'Fetching and parsing page content' },
                                { name: 'Source Credibility Check', description: 'Verifying domain reputation' },
                                { name: 'Claim Verification', description: 'Cross-referencing with fact-check sources' }
                            ],
                            statusMessages: [
                                'Fetching URL content...',
                                'Extracting main article...',
                                'Checking source credibility...',
                                'Verifying claims against trusted sources...'
                            ]
                        }
                    };

                    // Default fallback config
                    const DEFAULT_CONFIG = {
                        title: 'Analyzing Media',
                        subtitle: 'Processing multi-modal vectors...',
                        badge: 'PROCESSING',
                        steps: [
                            { name: 'Content Analysis', description: 'Analyzing content structure' },
                            { name: 'Metadata Verification', description: 'Verifying file metadata' },
                            { name: 'Authenticity Check', description: 'Checking for manipulation' }
                        ],
                        statusMessages: [
                            'Initializing analysis...',
                            'Processing content...',
                            'Verifying authenticity...',
                            'Finalizing results...'
                        ]
                    };

                    function renderAnalysisSteps(steps) {
                        const container = document.getElementById('analysisSteps');
                        container.innerHTML = steps.map((step, index) => `
                            <div data-step="${index}">
                                <div class="flex justify-between text-xs mb-2 font-medium">
                                    <span class="step-name text-slate-300">${step.name}</span>
                                    <span class="step-status text-slate-500 font-mono">${index === 0 ? 'Processing...' : 'Pending'}</span>
                                </div>
                                <div class="progress-track h-2 w-full rounded-full overflow-hidden">
                                    <div class="step-bar h-full ${index === 0 ? 'bg-accent-blue w-[30%] shadow-[0_0_10px_rgba(58,141,255,0.4)]' : 'bg-slate-700 w-0'} rounded-full transition-all duration-1000"></div>
                                </div>
                            </div>
                        `).join('');
                    }

                    function updateHeader(config) {
                        const titleEl = document.querySelector('h3');
                        const subtitleEl = document.querySelector('h3 + p');
                        const badgeEl = document.querySelector('.font-mono.text-accent-green');

                        if (titleEl) {
                            titleEl.innerHTML = `<span class="relative flex h-3 w-3"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-accent-blue opacity-75"></span><span class="relative inline-flex rounded-full h-3 w-3 bg-accent-blue"></span></span> ${config.title}`;
                        }
                        if (subtitleEl) {
                            subtitleEl.textContent = config.subtitle;
                        }
                        if (badgeEl) {
                            badgeEl.textContent = config.badge;
                        }
                    }

                    function animateProgress(config, onComplete) {
                        const steps = document.querySelectorAll('[data-step]');
                        const statusText = document.getElementById('loadingStatus');
                        let currentStep = 0;
                        const stepDuration = 1200;

                        function updateStep() {
                            if (currentStep >= steps.length) {
                                if (onComplete) onComplete();
                                return;
                            }

                            const stepEl = steps[currentStep];
                            const bar = stepEl.querySelector('.step-bar');
                            const status = stepEl.querySelector('.step-status');

                            // Update status message
                            if (statusText && config.statusMessages[currentStep]) {
                                statusText.textContent = config.statusMessages[currentStep];
                            }

                            // Animate current step to 100%
                            bar.className = 'step-bar h-full bg-accent-blue w-full rounded-full shadow-[0_0_10px_rgba(58,141,255,0.4)] transition-all duration-1000';
                            status.textContent = 'Processing...';
                            status.className = 'step-status text-accent-blue font-mono';

                            setTimeout(() => {
                                // Mark as complete
                                bar.classList.replace('bg-accent-blue', 'bg-accent-green');
                                bar.classList.replace('shadow-[0_0_10px_rgba(58,141,255,0.4)]', 'shadow-[0_0_10px_rgba(0,217,145,0.4)]');
                                status.textContent = 'Complete';
                                status.className = 'step-status text-accent-green font-mono';

                                // Start next step
                                currentStep++;
                                if (currentStep < steps.length) {
                                    const nextBar = steps[currentStep].querySelector('.step-bar');
                                    const nextStatus = steps[currentStep].querySelector('.step-status');
                                    nextBar.className = 'step-bar h-full bg-accent-blue w-[30%] rounded-full shadow-[0_0_10px_rgba(58,141,255,0.4)] transition-all duration-500';
                                    nextStatus.textContent = 'Processing...';
                                    nextStatus.className = 'step-status text-accent-blue font-mono';
                                }

                                setTimeout(updateStep, 300);
                            }, stepDuration);
                        }

                        updateStep();
                    }

                    // API configuration
                    const API_BASE_URL = 'http://localhost:5000';

                    // Logging helper
                    function logDebug(message, data = null) {
                        console.log(`[VisioNova] ${message}`, data || '');
                    }

                    // Progress tracking
                    let progressCallbacks = {};

                    // Update a specific step's progress
                    function updateStepProgress(stepIndex, status, progress) {
                        const steps = document.querySelectorAll('[data-step]');
                        if (stepIndex >= steps.length) return;

                        const step = steps[stepIndex];
                        const bar = step.querySelector('.step-bar');
                        const statusEl = step.querySelector('.step-status');

                        if (status === 'processing') {
                            bar.className = 'step-bar h-full bg-accent-blue rounded-full shadow-[0_0_10px_rgba(58,141,255,0.4)] transition-all duration-500';
                            bar.style.width = `${progress}%`;
                            statusEl.textContent = 'Processing...';
                            statusEl.className = 'step-status text-accent-blue font-mono';
                        } else if (status === 'complete') {
                            bar.className = 'step-bar h-full bg-accent-green rounded-full shadow-[0_0_10px_rgba(0,217,145,0.4)] transition-all duration-500';
                            bar.style.width = '100%';
                            statusEl.textContent = 'Complete';
                            statusEl.className = 'step-status text-accent-green font-mono';
                        }
                    }

                    // Update loading status text
                    function updateLoadingStatus(text) {
                        const statusEl = document.getElementById('loadingStatus');
                        if (statusEl) statusEl.textContent = text;
                    }

                    // Call actual analysis API with progress updates
                    async function performAnalysisWithProgress(mediaType, config) {
                        // Get stored input data
                        if (typeof VisioNovaStorage === 'undefined') {
                            logDebug('ERROR: VisioNovaStorage not available');
                            updateLoadingStatus('Error: Storage module not loaded');
                            return null;
                        }

                        const inputData = VisioNovaStorage.getFile(mediaType);
                        logDebug(`Input data for ${mediaType}:`, inputData);

                        // For document uploads (PDF/DOCX), data is in IndexedDB, not sessionStorage
                        const isDocumentUpload = mediaType === 'text' && sessionStorage.getItem('visioNova_isDocument') === 'true';

                        if (!isDocumentUpload && (!inputData || !inputData.data)) {
                            logDebug(`No input data found for: ${mediaType}`);
                            updateLoadingStatus('Error: No input data found. Please go back and upload/enter data.');
                            return null;
                        }

                        logDebug(`Performing analysis for: ${mediaType}`);

                        try {
                            if (mediaType === 'url') {
                                // Step 1: Content Extraction - Start
                                updateStepProgress(0, 'processing', 30);
                                updateLoadingStatus(config.statusMessages[0] || 'Fetching content...');

                                // Animate progress while waiting for API
                                let progressValue = 30;
                                const progressInterval = setInterval(() => {
                                    if (progressValue < 75) {
                                        progressValue += 3;
                                        updateStepProgress(0, 'processing', progressValue);
                                    }
                                }, 500);

                                // Call fact-check API with timeout
                                const controller = new AbortController();
                                const timeoutId = setTimeout(() => controller.abort(), 60000); // 60 second timeout

                                try {
                                    const response = await fetch(`${API_BASE_URL}/api/fact-check`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({ input: inputData.data }),
                                        signal: controller.signal
                                    });

                                    clearTimeout(timeoutId);
                                    clearInterval(progressInterval);

                                    // Step 1: Got response
                                    updateStepProgress(0, 'processing', 90);
                                    updateLoadingStatus(config.statusMessages[1] || 'Extracting content...');

                                    if (!response.ok) {
                                        const errorText = await response.text();
                                        logDebug(`API error response: ${response.status}`, errorText);
                                        throw new Error(`API error: ${response.status} - ${errorText}`);
                                    }

                                    // Step 1: Got response
                                    updateStepProgress(0, 'processing', 90);
                                    updateLoadingStatus(config.statusMessages[1] || 'Extracting content...');

                                    // Parse response
                                    const result = await response.json();
                                    logDebug('Fact-check result received:', result);

                                    // Step 2: Processing
                                    updateStepProgress(1, 'processing', 70);
                                    await new Promise(r => setTimeout(r, 300)); // Brief pause for visual

                                    // Step 2: Complete
                                    updateStepProgress(1, 'complete', 100);

                                    // Step 3: Claim Verification - Start
                                    updateStepProgress(2, 'processing', 50);
                                    updateLoadingStatus(config.statusMessages[3] || 'Verifying claims...');

                                    // Store the result
                                    sessionStorage.setItem('visioNova_factcheck_result', JSON.stringify(result));
                                    VisioNovaStorage.clearFile('url');

                                    await new Promise(r => setTimeout(r, 400)); // Brief pause for visual

                                    // Step 3: Complete
                                    updateStepProgress(2, 'complete', 100);
                                    updateLoadingStatus('Analysis complete!');

                                    return result;
                                } catch (fetchError) {
                                    clearInterval(progressInterval);
                                    throw fetchError; // Re-throw to be caught by outer catch
                                }
                            } else if (mediaType === 'text') {
                                // Handle text analysis with backend API
                                const isDocument = sessionStorage.getItem('visioNova_isDocument') === 'true';

                                // Step 1: Linguistic Pattern Analysis
                                updateStepProgress(0, 'processing', 30);
                                updateLoadingStatus(config.statusMessages[0] || 'Processing document...');

                                let progressValue = 30;
                                const progressInterval = setInterval(() => {
                                    if (progressValue < 75) {
                                        progressValue += 5;
                                        updateStepProgress(0, 'processing', progressValue);
                                    }
                                }, 400);

                                try {
                                    const controller = new AbortController();
                                    const timeoutId = setTimeout(() => controller.abort(), 60000); // 60s for large docs

                                    let response;

                                    if (isDocument) {
                                        // PDF/DOCX - use file upload endpoint with actual File object
                                        updateLoadingStatus('Extracting text from document...');

                                        const docFile = await VisioNovaStorage.getDocumentFile();
                                        if (!docFile || !docFile.file) {
                                            throw new Error('Document file not found. Please re-upload.');
                                        }

                                        console.log('[Dashboard] Retrieved document file from IndexedDB:', docFile.fileName);

                                        // Create FormData with the actual File
                                        const formData = new FormData();
                                        formData.append('file', docFile.file, docFile.fileName);
                                        formData.append('explain', 'true');

                                        response = await fetch(`${API_BASE_URL}/api/detect-ai/upload`, {
                                            method: 'POST',
                                            body: formData,
                                            signal: controller.signal
                                        });

                                        // Clear the document file after upload
                                        await VisioNovaStorage.clearDocumentFile();
                                    } else {
                                        // Plain text - use regular text endpoint
                                        const textContent = inputData.data;
                                        response = await fetch(`${API_BASE_URL}/api/detect-ai`, {
                                            method: 'POST',
                                            headers: { 'Content-Type': 'application/json' },
                                            body: JSON.stringify({ text: textContent, explain: true }),
                                            signal: controller.signal
                                        });
                                    }

                                    clearTimeout(timeoutId);
                                    clearInterval(progressInterval);

                                    if (!response.ok) {
                                        const errorText = await response.text();
                                        logDebug(`Text API error: ${response.status}`, errorText);
                                        throw new Error(`Text analysis failed: ${response.status}`);
                                    }

                                    // Step 1: Complete
                                    updateStepProgress(0, 'complete', 100);

                                    // Step 2: Source Attribution
                                    updateStepProgress(1, 'processing', 50);
                                    updateLoadingStatus(config.statusMessages[1] || 'Analyzing patterns...');

                                    const result = await response.json();
                                    logDebug('Text analysis result:', result);
                                    logDebug('Storing result in sessionStorage');

                                    await new Promise(r => setTimeout(r, 400));
                                    updateStepProgress(1, 'complete', 100);

                                    // Step 3: AI Writing Detection
                                    updateStepProgress(2, 'processing', 50);
                                    updateLoadingStatus(config.statusMessages[2] || 'Running AI detection...');

                                    // Store result for TextResultPage to use
                                    sessionStorage.setItem('visioNova_text_result', JSON.stringify(result));
                                    logDebug('Result stored. Keys:', Object.keys(result));
                                    logDebug('isDocument flag:', sessionStorage.getItem('visioNova_isDocument'));
                                    logDebug('documentFileName:', sessionStorage.getItem('visioNova_documentFileName'));

                                    // Don't remove isDocument flag yet - result page needs it
                                    // sessionStorage.removeItem('visioNova_isDocument');

                                    await new Promise(r => setTimeout(r, 500));
                                    updateStepProgress(2, 'complete', 100);
                                    updateLoadingStatus('Analysis complete! Redirecting...');

                                    logDebug('About to redirect to result page');

                                    return result;
                                } catch (fetchError) {
                                    clearInterval(progressInterval);
                                    logDebug('Text API error, will use client-side analysis:', fetchError);
                                    // Continue to result page - it will use client-side fallback
                                    for (let i = 0; i < config.steps.length; i++) {
                                        updateStepProgress(i, 'complete', 100);
                                    }
                                    updateLoadingStatus('Preparing results...');
                                    return null;
                                }
                            } else if (mediaType === 'image') {
                                // Handle image analysis with backend API
                                logDebug('Starting image analysis...');

                                // Step 1: Pixel Pattern Analysis
                                updateStepProgress(0, 'processing', 30);
                                updateLoadingStatus(config.statusMessages[0] || 'Analyzing pixel patterns...');

                                let progressValue = 30;
                                const progressInterval = setInterval(() => {
                                    if (progressValue < 80) {
                                        progressValue += 2;
                                        updateStepProgress(0, 'processing', progressValue);
                                    }
                                }, 300);

                                try {
                                    const controller = new AbortController();
                                    const timeoutId = setTimeout(() => controller.abort(), 120000); // 120s for image processing

                                    const response = await fetch(`${API_BASE_URL}/api/detect-image`, {
                                        method: 'POST',
                                        headers: { 'Content-Type': 'application/json' },
                                        body: JSON.stringify({
                                            image: inputData.data,
                                            filename: inputData.fileName,
                                            include_ela: true,
                                            include_metadata: true,
                                            include_watermark: true,
                                            include_c2pa: true,
                                            include_ai_analysis: true
                                        }),
                                        signal: controller.signal
                                    });

                                    clearTimeout(timeoutId);
                                    clearInterval(progressInterval);

                                    if (!response.ok) {
                                        const errorText = await response.text();
                                        logDebug(`Image API error: ${response.status}`, errorText);
                                        throw new Error(`Image analysis failed: ${response.status}`);
                                    }

                                    // Step 1: Complete
                                    updateStepProgress(0, 'complete', 100);

                                    // Step 2: Metadata Extraction
                                    updateStepProgress(1, 'processing', 50);
                                    updateLoadingStatus(config.statusMessages[1] || 'Extracting metadata...');

                                    const result = await response.json();
                                    logDebug('Image analysis result:', result);

                                    await new Promise(r => setTimeout(r, 400));
                                    updateStepProgress(1, 'complete', 100);

                                    // Step 3: AI Artifact Detection
                                    updateStepProgress(2, 'processing', 60);
                                    updateLoadingStatus(config.statusMessages[2] || 'Detecting AI artifacts...');

                                    // Store result for ImageResultPage to use
                                    sessionStorage.setItem('visioNova_image_result', JSON.stringify(result));
                                    logDebug('Image result stored in sessionStorage');

                                    await new Promise(r => setTimeout(r, 600));
                                    updateStepProgress(2, 'complete', 100);
                                    updateLoadingStatus('Analysis complete! Redirecting...');

                                    return result;
                                } catch (fetchError) {
                                    clearInterval(progressInterval);
                                    logDebug('Image API error:', fetchError);
                                    throw fetchError;
                                }
                            } else {
                                // For other media types (video, audio), simulate progress
                                for (let i = 0; i < config.steps.length; i++) {
                                    updateStepProgress(i, 'processing', 30);
                                    updateLoadingStatus(config.statusMessages[i] || 'Processing...');
                                    await new Promise(r => setTimeout(r, 600));
                                    updateStepProgress(i, 'processing', 70);
                                    await new Promise(r => setTimeout(r, 400));
                                    updateStepProgress(i, 'complete', 100);
                                }
                                return null;
                            }
                        } catch (error) {
                            console.error('[Dashboard] Analysis error:', error);
                            updateLoadingStatus('Analysis failed: ' + error.message);
                            sessionStorage.setItem('visioNova_analysis_error', error.message);
                            return null;
                        }
                    }

                    document.addEventListener('DOMContentLoaded', async () => {
                        logDebug('AnalysisDashboard loaded');
                        const params = new URLSearchParams(window.location.search);
                        const isAnalyzing = params.get('analyzing') === 'true';
                        const nextUrl = params.get('next');
                        const mediaType = params.get('media')?.toLowerCase() || 'default';

                        logDebug(`URL params: analyzing=${isAnalyzing}, media=${mediaType}, next=${nextUrl}`);

                        // Get config for this media type
                        const config = ANALYSIS_CONFIGS[mediaType] || DEFAULT_CONFIG;

                        // Render the UI
                        updateHeader(config);
                        renderAnalysisSteps(config.steps);

                        if (isAnalyzing) {
                            logDebug(`Starting analysis for media type: ${mediaType}`);
                            // Run analysis with real progress updates
                            const analysisResult = await performAnalysisWithProgress(mediaType, config);

                            if (analysisResult !== null) {
                                // Redirect after successful completion
                                logDebug(`Analysis complete, redirecting to: ${nextUrl || 'ImageResultPage.html'}`);
                                setTimeout(() => {
                                    if (nextUrl) {
                                        window.location.href = decodeURIComponent(nextUrl);
                                    } else {
                                        window.location.href = 'ImageResultPage.html';
                                    }
                                }, 500);
                            } else {
                                // Analysis failed — show error and offer retry
                                logDebug('Analysis failed, staying on dashboard');
                                updateLoadingStatus('Analysis failed. Please go back and try again.');
                            }
                        } else {
                            logDebug('Not analyzing, just displaying dashboard');
                        }
                    });
                </script>
            </div>
    </div>
    </main>
    </div>
